<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Дитяча математика 5-8 років</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap"
    rel="stylesheet"
  />

  <!-- Animate CSS -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- Interact.js -->
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<!-- Howler -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      background:
        radial-gradient(circle at top, #fff7c7, #bfe9ff);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .game-wrapper {
      min-height: 100vh;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-card {
      width: 100%;
      max-width: 850px;
      border-radius: 35px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 15px 45px rgba(0,0,0,0.15);
      overflow: hidden;
      position: relative;
    }

    .top-bar {
      background: linear-gradient(135deg, #ffb703, #ff7b00);
      padding: 18px;
      color: white;
    }

    .game-title {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin: 0;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: rgba(255,255,255,0.2);
      padding: 10px 18px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .game-content {
      padding: 25px;
    }

    .question-card {
      background: linear-gradient(180deg, #e8f9ff, #ffffff);
      border-radius: 28px;
      padding: 24px;
      text-align: center;
      border: 3px dashed #8fd3ff;
      margin-bottom: 20px;
    }

    .task-text {
      font-size: 1.4rem;
      font-weight: 800;
      color: #333;
      margin-bottom: 16px;
    }

    /* .emoji-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 80px;
      margin-bottom: 20px;
    } */

    .emoji-row{
  position: relative;

  width: 100%;

  min-height: 260px;

  margin-bottom: 20px;

  border-radius: 25px;

  background:
    linear-gradient(
      180deg,
      #ffffff,
      #f3fbff
    );

  overflow: hidden;
}

    .emoji-item {
      font-size: 2.5rem;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    .math-row {
      font-size: 3rem;
      font-weight: 900;
      color: #ff6b00;
      margin-bottom: 20px;
    }

    .answers-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .answer-btn {
      border: none;
      border-radius: 22px;
      min-height: 80px;
      font-size: 2rem;
      font-weight: 900;
      transition: 0.2s;
      color: white;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .answer-btn:active {
      transform: scale(0.96);
    }

    .btn-a {
      background: linear-gradient(135deg, #ff4d6d, #ff758f);
    }

    .btn-b {
      background: linear-gradient(135deg, #4cc9f0, #4895ef);
    }

    .btn-c {
      background: linear-gradient(135deg, #06d6a0, #1b9aaa);
    }

    .btn-d {
      background: linear-gradient(135deg, #f48c06, #ffba08);
    }

    .result-message {
      margin-top: 20px;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 900;
      min-height: 40px;
    }

    .success {
      color: #00a651;
    }

    .error {
      color: #d90429;
    }

    .bottom-panel {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .control-btn {
      border: none;
      border-radius: 18px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #8338ec, #3a86ff);
      box-shadow: 0 10px 18px rgba(0,0,0,0.15);
    }

    .level-box {
      margin-top: 18px;
      background: #fff4cf;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      font-weight: 800;
      color: #5f370e;
    }

    .drop-zone{
  margin-top:25px;

  min-height:180px;

  border:5px dashed #7cc9ff;

  border-radius:30px;

  background:#eefcff;

  display:flex;

  justify-content:center;

  align-items:center;

  align-content:flex-start;

  flex-wrap:wrap;

  gap:10px;

  padding:20px;

  position:relative;

  overflow:hidden;

  transition:0.3s;
}

.drop-zone.active{

  background:#d9f3ff;

  border-color:#3aa8ff;

  transform:scale(1.02);
}

.drop-label{
  width:100%;

  font-size:24px;

  color:#4687b0;
}

/* НОВЕ */
.game-object{
  width:80px;
  height:80px;
  object-fit:contain;
  margin:8px;
  transition:0.3s;
  user-select:none;
}

.game-object:hover{
  transform:scale(1.1) rotate(5deg);
}

.removed-object{
  opacity:0.3;
  filter:grayscale(100%);
}

.plus-sign{
  font-size:60px;
  font-weight:900;
  color:#ff7300;
  display: flex;
  align-items: center;
  justify-content: center;
}

    @media (max-width: 576px) {

      .game-title {
        font-size: 1.5rem;
      }

      .math-row {
        font-size: 2.2rem;
      }

      .answer-btn {
        min-height: 70px;
        font-size: 1.6rem;
      }

      .emoji-item {
        font-size: 2rem;
      }

      .task-text {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-card">

    <div class="top-bar">

      <h1 class="game-title">
        🌟 Весела Математика 🌟
      </h1>

      <div class="stats-row">
        <div class="stat-box">
          ⭐ Бали:
          <span id="score">0</span>
        </div>

        <div class="stat-box">
          ❤️ Життя:
          <span id="lives">3</span>
        </div>

        <div class="stat-box">
          🎯 Рівень:
          <span id="level">1</span>
        </div>
      </div>

    </div>

    <div class="game-content">

      <div class="question-card">

        <div class="task-text" id="taskText">
          Полічи предмети та обери правильну відповідь
        </div>

        <div class="emoji-row" id="emojiRow"></div>

        <!-- <div class="drop-zone" id="dropZone">
          <div class="drop-label">
            Перетягни предмети сюди
          </div>
        </div> -->

        <div class="math-row" id="mathQuestion"></div>

      </div>

      <div class="answers-grid" id="answersGrid"></div>

      <div class="result-message" id="resultMessage"></div>

      <div class="level-box">
        Для дітей 5-8 років • Додавання та віднімання до 10
      </div>

      <div class="bottom-panel">

        <button class="control-btn" onclick="generateQuestion()">
          🔄 Нова задача
        </button>

        <button class="control-btn" onclick="resetGame()">
          🧹 Почати спочатку
        </button>       

      </div>

    </div>

  </div>
</div>

<script>

  let score = 0;
  let lives = 3;
  let level = 1;
  
  let correctAnswer = 0;
  
  const imageList = [
  'images/1.svg',
  'images/2.svg',
  'images/3.svg',
  'images/4.svg',
  'images/5.svg',
  'images/6.svg',
  'images/7.svg',
  'images/8.svg',
  'images/9.svg',
  'images/10.svg',
  'images/11.svg',
  'images/12.svg',
  'images/13.svg',
  'images/14.svg',
  'images/15.svg',
  'images/16.svg',
  'images/17.svg',
  'images/18.svg',
  'images/19.svg',
  'images/20.svg',
  'images/21.svg',
  'images/22.svg',
  'images/23.svg',
  'images/24.svg',
  'images/25.svg',
  'images/26.svg',
  'images/27.svg',
  'images/28.svg',
  'images/29.svg',
  'images/30.svg',
  'images/31.svg',
  'images/32.svg',
  'images/33.svg'
];
  
  const correctSound = new Howl({
    src: ['sounds/correct.mp3'],
    volume: 1
  });
  
  const wrongSound = new Howl({
    src: ['sounds/wrong.mp3'],
    volume: 1
  });
  
  function random(min, max) {
    return Math.floor(
      Math.random() * (max - min + 1)
    ) + min;
  }
  
  function generateQuestion() {
  
    if(lives <= 0){
      showGameOver();
      return;
    }
  
    const operation =
      Math.random() > 0.5 ? '+' : '-';
  
    let a;
    let b;
  
    if(operation === '+') {
  
      a = random(1, 5 + level);
      b = random(1, 5);
  
      if(a + b > 10){
        a = 10 - b;
      }
  
      correctAnswer = a + b;
  
    } else {
  
      a = random(3, 10);
      b = random(1, a - 1);
  
      correctAnswer = a - b;
    }
  
    const image =
      imageList[
        random(0, imageList.length - 1)
      ];
  
    document.getElementById(
      'mathQuestion'
    ).innerHTML =
      `${a} ${operation} ${b} = ?`;
  
    renderObjects(
      a,
      b,
      operation,
      image
    );
  
    generateAnswers(correctAnswer);
  
    document.getElementById(
      'resultMessage'
    ).innerHTML = '';
  }
  
  function renderObjects(
    a,
    b,
    operation,
    image
  ){
  
    let html = '';
  
    if(operation === '+'){
  
      for(let i = 0; i < a; i++){
  
        html += `
          <img
            src="${image}"
            class="game-object animate__animated animate__bounceIn"
          >
        `;
      }
  
      html += `
        <div class="plus-sign">
          +
        </div>
      `;
  
      for(let i = 0; i < b; i++){
  
        html += `
          <img
            src="${image}"
            class="game-object animate__animated animate__bounceIn"
          >
        `;
      }
  
    } else {
  
      for(let i = 0; i < a; i++){
  
        if(i >= a - b){
  
          html += `
            <img
              src="${image}"
              class="game-object removed-object"
            >
          `;
  
        } else {
  
          html += `
            <img
              src="${image}"
              class="game-object animate__animated animate__bounceIn"
            >
          `;
        }
      }
    }
  
    document.getElementById(
      'emojiRow'
    ).innerHTML = html;
  
    gsap.from(
      '.game-object',
      {
        scale: 0,
        duration: 0.5,
        stagger: 0.05,
        ease: 'back.out(1.7)'
      }
    );
  }
  
  function generateAnswers(correct){
  
    let answers = [correct];
  
    while(answers.length < 4){
  
      let wrong =
        correct + random(-3, 3);
  
      if(
        wrong >= 0 &&
        wrong <= 10 &&
        !answers.includes(wrong)
      ){
        answers.push(wrong);
      }
    }
  
    answers.sort(() =>
      Math.random() - 0.5
    );
  
    const classes = [
      'btn-a',
      'btn-b',
      'btn-c',
      'btn-d'
    ];
  
    let html = '';
  
    answers.forEach((answer, index) => {
  
      html += `
        <button
          class="
            answer-btn
            ${classes[index]}
            animate__animated
            animate__fadeInUp
          "
          onclick="checkAnswer(${answer})"
        >
          ${answer}
        </button>
      `;
    });
  
    document.getElementById(
      'answersGrid'
    ).innerHTML = html;
  }
  
  function checkAnswer(answer){
  
    const result =
      document.getElementById(
        'resultMessage'
      );
  
    if(answer === correctAnswer){
  
      correctSound.play();
  
      score += 10;
  
      if(score % 50 === 0){
        level++;
      }
  
      result.innerHTML =
        '🎉 Молодець!';
  
      result.className =
        'result-message success';
  
      gsap.fromTo(
        '.game-card',
        {
          scale: 1
        },
        {
          scale: 1.03,
          duration: 0.2,
          yoyo: true,
          repeat: 1
        }
      );
  
      Swal.fire({
        title: 'Супер!',
        text: 'Папа купить вкусняшку!',
        icon: 'success',
        confirmButtonText: 'Далі',
        background: '#ffffff',
        confirmButtonColor: '#3a86ff'
      }).then(() => {
  
        generateQuestion();
      });
  
    } else {
  
      wrongSound.play();
  
      lives--;
  
      result.innerHTML =
        '😥 Спробуй ще';
  
      result.className =
        'result-message error';
  
      gsap.fromTo(
        '.game-card',
        {
          x: -10
        },
        {
          x: 10,
          duration: 0.05,
          repeat: 5,
          yoyo: true
        }
      );
  
      if(lives <= 0){
  
        setTimeout(() => {
          showGameOver();
        }, 700);
      }
    }
  
    updateStats();
  }
  
  function updateStats(){
  
    document.getElementById(
      'score'
    ).innerText = score;
  
    document.getElementById(
      'lives'
    ).innerText = lives;
  
    document.getElementById(
      'level'
    ).innerText = level;
  }
  
  function showGameOver(){
  
    Swal.fire({
      title: 'Гру завершено!',
      html: `
        <div style="font-size:24px">
          🏆 Твій результат:
          <b>${score}</b>
        </div>
      `,
      icon: 'info',
      confirmButtonText: 'Грати знову',
      confirmButtonColor: '#ff7300'
    }).then(() => {
  
      resetGame();
    });
  
    document.getElementById(
      'emojiRow'
    ).innerHTML = '🏆';
  }
  
  function resetGame(){
  
    score = 0;
    lives = 3;
    level = 1;
  
    updateStats();
  
    generateQuestion();
  }
  
  generateQuestion();
  
  </script>


</body>
</html>
